<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Reading Part 2 - Weekend Activities</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
        /* Ngăn chặn hiện tượng kéo để reload trên mobile */
        overscroll-behavior-y: contain;
      }
      .drag-item {
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        touch-action: manipulation; /* Tối ưu cho cảm ứng */
      }
      .drag-item:active {
        transform: scale(0.98);
        opacity: 0.8;
      }
      .drop-zone {
        min-height: 56px;
        transition: all 0.3s ease;
      }
      @media (min-width: 768px) {
        .drop-zone { min-height: 64px; }
      }
      .number-badge {
        background: #e2e8f0;
        color: #64748b;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-weight: bold;
        font-size: 12px;
      }
      /* Custom scrollbar cho đẹp */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
  </head>
  <body class="min-h-screen flex flex-col">
    <!-- Header: Responsive Padding -->
    <header class="bg-white border-b border-slate-200 px-4 md:px-6 py-3 md:py-4 sticky top-0 z-40 shadow-sm">
      <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-2 md:gap-3">
          <a href="index.html" class="p-1.5 md:p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition-all">
            <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
          </a>
          <div class="hidden sm:block bg-blue-600 text-white p-2 rounded-lg">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
          </div>
          <div>
            <h1 class="text-base md:text-xl font-bold text-slate-800 leading-tight">Reading Part 2</h1>
            <div class="flex items-center gap-2 text-[11px] md:text-sm text-slate-500">
              <span class="font-medium"><b id="current-q-label">1</b>/13</span>
              <span class="h-3 w-px bg-slate-300"></span>
              <span class="text-blue-600 font-medium italic truncate max-w-[120px] md:max-w-none">Sắp xếp đoạn văn</span>
            </div>
          </div>
        </div>
        <button onclick="checkResult()" class="bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white px-4 md:px-8 py-2 md:py-2.5 rounded-lg md:rounded-xl text-sm md:text-base font-bold transition-all shadow-md">
          Nộp bài
        </button>
      </div>
    </header>

    <main class="flex-grow p-4 md:p-8">
      <div class="max-w-6xl mx-auto">
        <!-- Topic Label -->
        <div class="mb-5 md:mb-8 flex items-center gap-3">
          <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Topic:</span>
          <span id="topic-label" class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs md:text-sm font-bold border border-amber-200">
            Weekend activities
          </span>
        </div>

        <!-- Main Grid: Mobile 1 col, Desktop 2 cols -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-10 items-start">
          
          <!-- LEFT: YOUR ORDER (Trên mobile xuất hiện trước/hoặc sau tùy ý, ở đây để trước) -->
          <div class="space-y-4 order-2 lg:order-1">
            <div class="flex justify-between items-end px-1">
              <h2 class="text-[10px] font-black text-slate-400 tracking-widest uppercase italic">Thứ tự của bạn</h2>
              <button onclick="resetCurrent()" class="text-[10px] text-blue-600 font-bold hover:underline">LÀM LẠI</button>
            </div>
            <div id="drop-containers" class="space-y-3">
                <!-- Drop zones will be injected here -->
            </div>

            <!-- Translation Box: Ẩn bớt trên mobile nếu quá chật, hoặc scroll -->
            <div class="mt-6 bg-white p-4 md:p-5 rounded-2xl border border-slate-200 shadow-sm">
              <div class="flex items-center gap-2 mb-3">
                <div class="w-1 h-3 md:w-1.5 md:h-4 bg-blue-500 rounded-full"></div>
                <h3 class="font-bold text-slate-700 uppercase text-[9px] md:text-[10px] tracking-widest italic">Tra cứu từ vựng</h3>
              </div>
              <div id="full-translation-area" class="min-h-[60px] flex items-center justify-center border border-dashed border-slate-200 rounded-xl p-3 italic text-slate-400 text-[11px] md:text-sm text-center">
                Chạm/Di chuột vào câu để dịch...
              </div>
            </div>
          </div>

          <!-- RIGHT: SENTENCES POOL -->
          <div class="space-y-4 order-1 lg:order-2">
            <div class="px-1">
              <h2 class="text-[10px] font-black text-slate-400 tracking-widest uppercase italic">Danh sách câu hỏi</h2>
            </div>
            <div id="sentence-pool" class="grid grid-cols-1 gap-3 bg-slate-100/50 p-3 md:p-4 rounded-2xl min-h-[200px] md:min-h-[400px] border-2 border-dashed border-slate-200">
                <!-- Sentences will be injected here -->
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer: Responsive Navigation -->
    <div class="sticky bottom-0 bg-white/80 backdrop-blur-lg border-t border-slate-200 p-3 md:p-4 z-40">
      <div class="max-w-6xl mx-auto flex justify-between items-center gap-4">
        <button onclick="prevQuestion()" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-3 md:px-5 py-2 text-slate-500 font-bold hover:bg-slate-100 rounded-lg transition-colors text-xs md:text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
          <span class="hidden sm:inline">TRƯỚC</span>
        </button>
        
        <div class="flex gap-1.5 md:gap-2 overflow-x-auto py-2" id="pagination-dots">
            <!-- Dots -->
        </div>

        <button onclick="nextQuestion()" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-3 md:px-5 py-2 text-blue-600 font-bold hover:bg-blue-50 rounded-lg transition-colors text-xs md:text-sm">
          <span class="hidden sm:inline">TIẾP THEO</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>
      </div>
    </div>

    <script type="module">
      import { quizData } from './reading_p2.js';

      let currentIdx = 0;

      function initQuiz() {
        const data = quizData[currentIdx];
        if (!data) return;

        document.getElementById("current-q-label").innerText = currentIdx + 1;
        document.getElementById("topic-label").innerText = data.topic;

        const dropContainers = document.getElementById("drop-containers");
        dropContainers.innerHTML = "";
        for (let i = 1; i <= 5; i++) {
          dropContainers.innerHTML += `
            <div class="flex items-center gap-3 md:gap-4">
              <div class="flex-shrink-0"><div class="number-badge">${i}</div></div>
              <div id="drop-${i}" class="drop-zone flex-1 border-2 border-dashed border-slate-200 bg-white rounded-xl md:rounded-2xl p-2 flex items-center shadow-sm overflow-hidden text-xs md:text-sm"></div>
            </div>
          `;
        }

        const pool = document.getElementById("sentence-pool");
        pool.innerHTML = "";
        const shuffled = [...data.sentences].sort(() => Math.random() - 0.5);
        shuffled.forEach((s) => {
          const el = document.createElement("div");
          el.id = s.id;
          el.className = "drag-item bg-white p-3 md:p-4 rounded-xl shadow-sm text-xs md:text-sm text-slate-700 font-medium select-none border border-slate-200 hover:border-blue-400 hover:shadow-md transition-all";
          el.innerText = s.text;
          
          el.onclick = () => handleSentenceClick(s.id);
          el.onmouseover = () => showTranslation(s.id);
          // Hỗ trợ touch cho mobile để hiện bản dịch
          el.ontouchstart = () => showTranslation(s.id);
          pool.appendChild(el);
        });

        updateDots();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function handleSentenceClick(sId) {
        const el = document.getElementById(sId);
        const pool = document.getElementById("sentence-pool");
        const isInPool = el.parentElement.id === "sentence-pool";

        if (isInPool) {
          for (let i = 1; i <= 5; i++) {
            const zone = document.getElementById(`drop-${i}`);
            if (zone.children.length === 0) {
              zone.appendChild(el);
              zone.className = "drop-zone flex-1 border-2 border-blue-100 bg-blue-50/30 rounded-xl md:rounded-2xl p-2 flex items-center shadow-inner text-xs md:text-sm";
              return;
            }
          }
        } else {
          const parentZone = el.parentElement;
          parentZone.className = "drop-zone flex-1 border-2 border-dashed border-slate-200 bg-white rounded-xl md:rounded-2xl p-2 flex items-center shadow-sm text-xs md:text-sm";
          pool.appendChild(el);
        }
      }

      function showTranslation(sId) {
        const sentence = quizData[currentIdx].sentences.find((s) => s.id === sId);
        const area = document.getElementById("full-translation-area");
        if (!sentence) return;

        area.classList.remove("justify-center", "text-center");
        let html = `<div class="flex flex-wrap gap-x-4 md:gap-x-6 gap-y-2 md:gap-y-3 w-full">`;
        sentence.words.forEach((item) => {
          html += `
            <div class="flex flex-col border-b border-slate-100 pb-1">
              <span class="text-blue-600 font-bold text-xs md:text-base">${item.w}</span>
              <span class="text-[9px] md:text-[11px] text-slate-400 font-medium">${item.m}</span>
            </div>`;
        });
        html += `</div>`;
        area.innerHTML = html;
      }

      function updateDots() {
        const container = document.getElementById("pagination-dots");
        container.innerHTML = "";
        quizData.forEach((_, i) => {
          const dot = document.createElement("div");
          dot.className = `flex-shrink-0 w-1.5 h-1.5 md:w-2 md:h-2 rounded-full ${i === currentIdx ? "bg-blue-600 w-4 md:w-6" : "bg-slate-300"} transition-all`;
          container.appendChild(dot);
        });
      }

      window.checkResult = function() {
        const correctOrder = quizData[currentIdx].correct_order;
        let count = 0;
        let complete = true;

        for (let i = 1; i <= 5; i++) {
          const zone = document.getElementById(`drop-${i}`);
          const item = zone.children[0];
          
          if (!item) {
            complete = false;
            zone.classList.add("border-orange-300", "bg-orange-50");
            continue;
          }

          if (item.id === correctOrder[i - 1]) {
            zone.className = "drop-zone flex-1 border-2 border-emerald-500 bg-emerald-50 rounded-xl md:rounded-2xl p-2 flex items-center text-xs md:text-sm";
            count++;
          } else {
            zone.className = "drop-zone flex-1 border-2 border-red-400 bg-red-50 rounded-xl md:rounded-2xl p-2 flex items-center text-xs md:text-sm";
          }
        }

        if (!complete) {
          alert("Vui lòng hoàn thành tất cả các vị trí!");
        } else {
          alert(`Kết quả: ${count}/5 câu đúng.`);
        }
      };

      window.resetCurrent = () => initQuiz();
      window.nextQuestion = () => { if (currentIdx < quizData.length - 1) { currentIdx++; initQuiz(); } };
      window.prevQuestion = () => { if (currentIdx > 0) { currentIdx--; initQuiz(); } };

      initQuiz();
    </script>
  </body>
</html>
