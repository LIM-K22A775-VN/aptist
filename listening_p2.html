<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Nghe Part 2 - Giao diện Tối giản</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            color: #334155;
        }
        /* Hiệu ứng đổ bóng và viền cho các thẻ */
        .card-premium {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .card-premium:hover {
            border-color: #cbd5e1;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        /* Trạng thái đúng/sai */
        .status-correct { border: 2px solid #10b981 !important; background-color: #f0fdf4 !important; }
        .status-wrong { border: 2px solid #ef4444 !important; background-color: #fef2f2 !important; }
        
        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="p-2 text-slate-400 hover:bg-slate-100 rounded-full transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                </a>
                <div>
                    <h1 id="topic-title" class="font-extrabold text-slate-800 text-lg">Đang tải...</h1>
                    <p id="instructions" class="text-[10px] text-blue-600 font-bold uppercase tracking-widest italic"></p>
                </div>
            </div>
            <div id="page-indicator" class="text-[11px] font-black bg-slate-800 text-white px-3 py-1.5 rounded-lg uppercase tracking-tighter shadow-sm"></div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto mt-8 px-4 grid grid-cols-1 md:grid-cols-2 gap-6" id="speakers-grid">
        </main>

    <footer class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-slate-200">
        <div class="max-w-5xl mx-auto flex justify-between items-center px-4">
            <button onclick="window.changeTopic(-1)" class="group flex items-center gap-2 px-5 py-2.5 text-sm font-bold text-slate-500 hover:text-slate-800 transition-all">
                <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Trước đó
            </button>
            
            <div id="pagination-dots" class="flex gap-2"></div>

            <button onclick="window.changeTopic(1)" class="group flex items-center gap-2 px-5 py-2.5 text-sm font-bold text-blue-600 hover:text-blue-800 transition-all">
                Tiếp theo
                <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
    </footer>

    <script type="module">
        import { listening_practice } from './listening_p2.js';
        let currentIdx = 0;

        function initQuiz() {
            const data = listening_practice[currentIdx];
            if (!data) return;

            // Cập nhật Header
            document.getElementById('topic-title').innerText = data.topic;
            document.getElementById('instructions').innerText = data.instructions;
            document.getElementById('page-indicator').innerText = `${currentIdx + 1} / ${listening_practice.length}`;
            
            // Xóa dữ liệu cũ trong Grid
            const grid = document.getElementById('speakers-grid');
            grid.innerHTML = '';

            // Tạo các thẻ Speaker
            data.questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = "card-premium p-6 flex flex-col gap-5";
                card.id = `card-${idx}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-md font-black text-[10px] uppercase tracking-widest">${q.speaker}</span>
                        <button onclick="window.toggleHint(${idx})" class="text-[10px] font-bold text-slate-400 hover:text-blue-600 uppercase transition-colors underline decoration-dotted underline-offset-4">Transcript</button>
                    </div>

                    <button onclick="window.speakText('${q.transcript.replace(/'/g, "\\'")}')" 
                            class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold flex items-center justify-center gap-3 transition-all active:scale-95 shadow-md shadow-blue-200">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                        NGHE SPEAKER
                    </button>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 italic">Chọn đáp án:</label>
                        <select id="select-${idx}" onchange="window.checkAnswer(${idx})" class="w-full bg-white border border-slate-200 p-3 rounded-xl text-sm font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all appearance-none cursor-pointer">
                            <option value="-1">-- Click để chọn --</option>
                            ${q.options.map((opt, i) => `<option value="${i}">${opt}</option>`).join('')}
                        </select>
                    </div>

                    <div id="hint-${idx}" class="hidden space-y-3 pt-2">
                        <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
                            <p class="text-[13px] text-slate-600 leading-relaxed font-medium italic">"${q.transcript}"</p>
                            <div class="h-px bg-slate-200 my-3"></div>
                            <p class="text-[12px] text-slate-400 font-medium tracking-tight italic leading-relaxed">
                                <span class="font-black uppercase text-[9px] mr-1 opacity-60">Dịch:</span> ${q.translation}
                            </p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            updateDots();
        }

        // Tính năng đọc văn bản tự động (TTS)
        window.speakText = (text) => {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'en-US';
            speech.rate = 0.85; // Tốc độ đọc chậm một chút để người học dễ nghe
            window.speechSynthesis.speak(speech);
        };

        // Kiểm tra đáp án ngay khi chọn
        window.checkAnswer = (idx) => {
            const data = listening_practice[currentIdx].questions[idx];
            const select = document.getElementById(`select-${idx}`);
            const card = document.getElementById(`card-${idx}`);
            const userVal = parseInt(select.value);

            card.classList.remove('status-correct', 'status-wrong');
            if (userVal === data.correct_answer) {
                card.classList.add('status-correct');
            } else if (userVal !== -1) {
                card.classList.add('status-wrong');
            }
        };

        window.toggleHint = (idx) => {
            document.getElementById(`hint-${idx}`).classList.toggle('hidden');
        };

        // Chuyển chủ đề
        window.changeTopic = (step) => {
            const nextIdx = currentIdx + step;
            if (nextIdx >= 0 && nextIdx < listening_practice.length) {
                currentIdx = nextIdx;
                initQuiz();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        // Cập nhật các chấm chỉ số trang
        function updateDots() {
            const container = document.getElementById('pagination-dots');
            container.innerHTML = listening_practice.map((_, i) => `
                <div class="w-1.5 h-1.5 rounded-full ${i === currentIdx ? 'bg-blue-600 scale-150' : 'bg-slate-200'} transition-all duration-300"></div>
            `).join('');
        }

        initQuiz();
    </script>
</body>
</html>
